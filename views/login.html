<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clínica patita coja — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-secondary d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-lg p-4 bg-white rounded" style="width: 100%; max-width: 400px;">
        <h3 class="text-center text-primary mb-4 fw-bold">Ingreso Administración</h3>
        
        <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" id="username" class="form-control" placeholder="admin@clinica.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Entrar al Panel</button>
        </form>
        <div class="text-center mt-3">
            <a href="/index.html" class="text-decoration-none small text-muted">  Volver al Inicio</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const alertBox = document.getElementById('alertBox');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (data.success) {
                    // Redirige a la ruta del panel de administración
                    window.location.href = '/admin';
                } else {
                    // Muestra el mensaje de error de la rúbrica
                    alertBox.textContent = data.message;
                    alertBox.classList.remove('d-none');
                }
            } catch (err) {
                alertBox.textContent = "Error al conectar con el servidor.";
                alertBox.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
